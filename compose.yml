services:
  digital-cookbook:
    build:
      context: .
    image: digital-cookbook:local
    ports:
      - "${PORT:-4000}:${PORT:-4000}"
    environment:
      PORT: ${PORT:-4000}
      HOST: 0.0.0.0
      COOKBOOK_DB_PATH: ${COOKBOOK_DB_PATH:-/app/data/cookbook.db}
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      AUTH_USERNAME: ${AUTH_USERNAME:-}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-}
    volumes:
      - cookbook_data:/app/data
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O /dev/null "http://127.0.0.1:$${PORT:-4000}/health" || exit 1
      interval: 2m
      timeout: 3s
      start_period: 20s
      retries: 3

volumes:
  cookbook_data:
