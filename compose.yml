services:
  digital-cookbook:
    build:
      context: .
    image: digital-cookbook:local
    environment:
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      AUTH_USERNAME: ${AUTH_USERNAME:-}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-}
      PORT: ${PORT:-4000}
      HOST: ${HOST:-0.0.0.0}
      COOKBOOK_DB_PATH: ${COOKBOOK_DB_PATH:-/app/data/cookbook.db}
    ports:
      - "${PORT:-4000}:${PORT:-4000}"
    volumes:
      - cookbook_data:/app/data
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          port="$${PORT:-4000}";
          case "$$port" in ''|*[!0-9]*) port=4000 ;; esac;
          [ "$$port" -gt 0 ] 2>/dev/null || port=4000;
          wget -q -T 2 -O /dev/null "http://127.0.0.1:$${port}/health" || exit 1
      interval: ${HEALTHCHECK_INTERVAL:-30s}
      timeout: ${HEALTHCHECK_TIMEOUT:-5s}
      start_period: ${HEALTHCHECK_START_PERIOD:-15s}
      retries: ${HEALTHCHECK_RETRIES:-3}

volumes:
  cookbook_data:
