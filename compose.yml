services:
  digital-cookbook:
    build:
      context: .
    image: digital-cookbook:local
    ports:
      - "${PORT:-4000}:${PORT:-4000}"
    environment:
      PORT: ${PORT:-4000}
      HOST: 0.0.0.0
      COOKBOOK_DB_PATH: ${COOKBOOK_DB_PATH:-/app/data/cookbook.db}
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      AUTH_USERNAME: ${AUTH_USERNAME:-}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-}
    volumes:
      - cookbook_data:/app/data
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          port="$${PORT:-4000}";
          case "$$port" in ''|*[!0-9]*) port=4000 ;; esac;
          [ "$$port" -gt 0 ] 2>/dev/null || port=4000;
          HEALTHCHECK_PORT="$$port"
          HEALTHCHECK_TIMEOUT_VALUE="${HEALTHCHECK_TIMEOUT:-3s}"
          bun -e 'const fallbackMs = 3000; const parseDurationMs = (value) => { const input = String(value ?? "").trim(); if (!input) return fallbackMs; const normalized = input.replace(/\u03bc/g, "u").replace(/\u00b5/g, "u"); const plainSecondsMatch = normalized.match(/^[0-9]+(?:\.[0-9]+)?/); if (plainSecondsMatch && plainSecondsMatch[0].length === normalized.length) { const seconds = Number(normalized); return Number.isFinite(seconds) && seconds > 0 ? Math.max(1, Math.ceil(seconds * 1000)) : fallbackMs; } const units = { ns: 1 / 1e6, us: 1 / 1e3, ms: 1, s: 1000, m: 60000, h: 3600000 }; const pattern = /([0-9]+(?:\.[0-9]+)?)(ns|us|ms|s|m|h)/g; let total = 0; let matchedLength = 0; for (const match of normalized.matchAll(pattern)) { if (match.index !== matchedLength) return fallbackMs; const amount = Number(match[1]); if (!Number.isFinite(amount) || amount < 0) return fallbackMs; total += amount * units[match[2]]; matchedLength += match[0].length; } if (matchedLength !== normalized.length || total <= 0) return fallbackMs; return Math.max(1, Math.ceil(total)); }; const port = Number(process.env.HEALTHCHECK_PORT || "4000"); const timeoutMs = parseDurationMs(process.env.HEALTHCHECK_TIMEOUT_VALUE || "3s"); const response = await fetch("http://127.0.0.1:" + port + "/health", { signal: AbortSignal.timeout(timeoutMs) }); if (!response.ok) throw new Error("Health check failed with status " + response.status);'
      interval: ${HEALTHCHECK_INTERVAL:-2m}
      timeout: ${HEALTHCHECK_TIMEOUT:-3s}
      start_period: ${HEALTHCHECK_START_PERIOD:-20s}
      retries: ${HEALTHCHECK_RETRIES:-3}

volumes:
  cookbook_data:
