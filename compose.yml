services:
  digital-cookbook:
    build:
      context: .
    image: digital-cookbook:local
    ports:
      - "${PORT:-4000}:${PORT:-4000}"
    environment:
      PORT: ${PORT:-4000}
      HOST: 0.0.0.0
      COOKBOOK_DB_PATH: ${COOKBOOK_DB_PATH:-/app/data/cookbook.db}
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      AUTH_USERNAME: ${AUTH_USERNAME:-}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-}
    volumes:
      - cookbook_data:/app/data
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          port="$${PORT:-4000}";
          timeout="$${HEALTHCHECK_TIMEOUT:-3s}";
          case "$$port" in ''|*[!0-9]*) port=4000 ;; esac;
          [ "$$port" -gt 0 ] 2>/dev/null || port=4000;
          http_timeout=0;
          valid_timeout=1;
          remaining="$$timeout";
          case "$$remaining" in *[!0-9smh]*) valid_timeout=0 ;; esac;
          while [ "$$valid_timeout" -eq 1 ] && [ -n "$$remaining" ]; do
            number="$${remaining%%[!0-9]*}";
            [ -n "$$number" ] || { valid_timeout=0; break; };
            rest="$${remaining#$$number}";
            if [ -z "$$rest" ]; then
              if [ "$$remaining" = "$$timeout" ]; then
                http_timeout=$$((http_timeout + number));
              else
                valid_timeout=0;
              fi;
              break;
            fi;
            unit="$${rest%"$${rest#?}"}";
            remaining="$${rest#?}";
            case "$$unit" in
              s) http_timeout=$$((http_timeout + number)) ;;
              m) http_timeout=$$((http_timeout + number * 60)) ;;
              h) http_timeout=$$((http_timeout + number * 3600)) ;;
              *) valid_timeout=0 ;;
            esac;
          done;
          [ "$$valid_timeout" -eq 1 ] || http_timeout=3;
          [ "$$http_timeout" -gt 0 ] 2>/dev/null || http_timeout=3;
          wget -q -T "$$http_timeout" -O /dev/null "http://127.0.0.1:$${port}/health" || exit 1
      interval: ${HEALTHCHECK_INTERVAL:-2m}
      timeout: ${HEALTHCHECK_TIMEOUT:-3s}
      start_period: ${HEALTHCHECK_START_PERIOD:-20s}
      retries: ${HEALTHCHECK_RETRIES:-3}

volumes:
  cookbook_data:
